name: 生成每日 AI 日报

on:
  schedule:
    # 每天北京时间 8:00（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许推送到仓库

jobs:
  generate-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 生成日报
        env:
          HUNYUAN_API_KEY: ${{ secrets.HUNYUAN_API_KEY }}
        run: node generate.js

      - name: 提交日报 JSON
        run: |
          git config user.name "xuxu-bot"
          git config user.email "bot@xuxu.daily"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 $(date +%Y-%m-%d) AI 日报"
          git push
